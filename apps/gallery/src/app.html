<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<!-- Theming channel inherited from yesid.dev (GO-W2.2 pre-paint theme
		     resolution). Markup default stays dark (no-JS, crawlers). Synchronous +
		     before CSSOM => zero flash. localStorage choice wins; otherwise dark. -->
		<script>
			(function () {
				var d = document.documentElement, t = null;
				try { t = localStorage.getItem('theme'); } catch (e) {}
				if (t !== 'light' && t !== 'dark') {
					t = 'dark';
				}
				d.dataset.theme = t;
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
