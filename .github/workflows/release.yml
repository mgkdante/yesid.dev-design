name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated release tag (vX.Y.Z or prerelease)
        required: true
        type: string
      mode:
        description: Verify an immutable release or recover a failed first publication
        required: true
        default: verify
        type: choice
        options:
          - verify
          - recover-first-publication
      recovery_run_id:
        description: Failed tag-push release run ID (recovery only)
        required: false
        type: string
      immutable_settings_tag_object:
        description: Owner-confirmed exact tag object after the immutable-settings preflight (recovery only)
        required: false
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_MODE: ${{ github.event_name == 'push' && 'publish' || inputs.mode }}
      RECOVERY_RUN_ID: ${{ inputs.recovery_run_id || '' }}
      IMMUTABLE_SETTINGS_TAG_OBJECT: ${{ inputs.immutable_settings_tag_object || '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Check canonical immutable-release preconditions
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REPOSITORY" != "mgkdante/yesid.dev-design" ]]; then
            echo "::error::releases are restricted to mgkdante/yesid.dev-design"
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          git fetch --no-tags origin \
            refs/heads/main:refs/remotes/origin/main
          git rev-parse --verify "refs/remotes/origin/main^{commit}" >/dev/null
          tag_object="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{tag}")"
          peeled_commit="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          git merge-base --is-ancestor "$peeled_commit" refs/remotes/origin/main
          remote_tag_object="$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            --jq 'select(.object.type == "tag") | .object.sha')"
          test "$remote_tag_object" = "$tag_object"
          release_version="${RELEASE_TAG#v}"
          bun run release:check -- --version "$release_version" --tag "$RELEASE_TAG"

          case "$RELEASE_MODE" in
            publish)
              if [[ "$GITHUB_EVENT_NAME" != "push" || -n "$RECOVERY_RUN_ID" || -n "$IMMUTABLE_SETTINGS_TAG_OBJECT" ]]; then
                echo "::error::publish mode is reserved for the exact tag-push event"
                exit 1
              fi
              ;;
            verify)
              if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" || -n "$RECOVERY_RUN_ID" || -n "$IMMUTABLE_SETTINGS_TAG_OBJECT" ]]; then
                echo "::error::verify mode does not accept recovery evidence"
                exit 1
              fi
              ;;
            recover-first-publication)
              if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]]; then
                echo "::error::recovery requires workflow_dispatch"
                exit 1
              fi
              if [[ "$GITHUB_ACTOR" != "$GITHUB_REPOSITORY_OWNER" ]]; then
                echo "::error::first-publication recovery is restricted to the repository owner"
                exit 1
              fi
              if [[ ! "$RECOVERY_RUN_ID" =~ ^[1-9][0-9]*$ ]]; then
                echo "::error::recovery requires the failed tag-push release run ID"
                exit 1
              fi
              if [[ "$IMMUTABLE_SETTINGS_TAG_OBJECT" != "$tag_object" ]]; then
                echo "::error::immutable-settings receipt must equal the exact annotated tag object"
                exit 1
              fi
              recovery_run="$RUNNER_TEMP/recovery-run.json"
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RECOVERY_RUN_ID}" >"$recovery_run"
              jq -e \
                --arg tag "$RELEASE_TAG" \
                --arg commit "$peeled_commit" '
                  .event == "push" and
                  .path == ".github/workflows/release.yml" and
                  .head_branch == $tag and
                  .head_sha == $commit and
                  .status == "completed" and
                  .conclusion == "failure"
                ' "$recovery_run" >/dev/null
              ;;
            *)
              echo "::error::invalid release mode: $RELEASE_MODE"
              exit 1
              ;;
          esac

      - name: Detect exact-tag release state
        id: release-state
        run: |
          set -euo pipefail
          release_pages="$RUNNER_TEMP/release-pages.json"
          release_json="$RUNNER_TEMP/existing-release.json"
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            >"$release_pages"
          jq --arg tag "$RELEASE_TAG" \
            '[.[][] | select(.tag_name == $tag)]' \
            "$release_pages" >"$release_json"
          release_count="$(jq -r 'length' "$release_json")"

          if (( release_count > 1 )); then
            echo "::error::multiple Releases exist for exact tag $RELEASE_TAG; refusing ambiguous mutation"
            exit 1
          fi

          if (( release_count == 0 )); then
            if [[ "$RELEASE_MODE" != "publish" && "$RELEASE_MODE" != "recover-first-publication" ]]; then
              echo "::error::workflow_dispatch verifies an existing exact-tag release only"
              exit 1
            fi
            echo "exists=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          release_id="$(jq -er '.[0].id | select(type == "number" and . > 0)' "$release_json")"
          if jq -e '.[0].draft == true' "$release_json" >/dev/null; then
            echo "::error::existing draft release $RELEASE_TAG (ID $release_id) will not be mutated. Inspect and delete only that draft before rerunning the failed push or using proven recovery."
            exit 1
          fi
          if ! jq -e '.[0].draft == false and .[0].immutable == true' "$release_json" >/dev/null; then
            echo "::error::existing release $RELEASE_TAG (ID $release_id) is not a published immutable release"
            exit 1
          fi
          if [[ "$RELEASE_MODE" == "recover-first-publication" ]]; then
            echo "::error::first-publication recovery requires the Release to be absent"
            exit 1
          fi
          echo "exists=true" >>"$GITHUB_OUTPUT"
          echo "release_id=$release_id" >>"$GITHUB_OUTPUT"

      - name: Build canonical archive
        if: steps.release-state.outputs.exists == 'false'
        run: |
          set -euo pipefail
          release_archive="$RUNNER_TEMP/yesid.dev-design-${RELEASE_TAG}.tar"
          bun tools/release-archive.ts build \
            --tag "$RELEASE_TAG" \
            --output "$release_archive" \
            >"$RUNNER_TEMP/built-archive-evidence.json"

      - name: Create exact draft release
        id: create-draft
        if: steps.release-state.outputs.exists == 'false'
        run: |
          set -euo pipefail
          release_version="${RELEASE_TAG#v}"
          version_without_build="${release_version%%+*}"
          prerelease=false
          if [[ "$version_without_build" == *-* ]]; then
            prerelease=true
          fi
          draft_json="$RUNNER_TEMP/created-draft-release.json"
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/releases" \
            -f tag_name="$RELEASE_TAG" \
            -f name="$RELEASE_TAG" \
            -f body="Canonical immutable release ${RELEASE_TAG}." \
            -F draft=true \
            -F prerelease="$prerelease" \
            >"$draft_json"
          jq -e \
            --arg tag "$RELEASE_TAG" \
            --argjson prerelease "$prerelease" '
              .tag_name == $tag and
              .draft == true and
              .immutable == false and
              .prerelease == $prerelease and
              (.id | type == "number" and . > 0)
            ' "$draft_json" >/dev/null
          release_id="$(jq -r '.id' "$draft_json")"
          echo "release_id=$release_id" >>"$GITHUB_OUTPUT"

      - name: Attach canonical archive
        if: steps.release-state.outputs.exists == 'false'
        run: |
          set -euo pipefail
          release_archive="$RUNNER_TEMP/yesid.dev-design-${RELEASE_TAG}.tar"
          asset_name="yesid.dev-design-${RELEASE_TAG}.tar"
          asset_query="$(jq -rn --arg asset "$asset_name" '$asset | @uri')"
          release_id="${{ steps.create-draft.outputs.release_id }}"
          asset_json="$RUNNER_TEMP/uploaded-asset.json"
          [[ "$release_id" =~ ^[1-9][0-9]*$ ]]
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @"$release_archive" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?name=${asset_query}" \
            >"$asset_json"
          jq -e --arg asset "$asset_name" '
            .name == $asset and
            .state == "uploaded" and
            .size > 0 and
            (.id | type == "number" and . > 0)
          ' "$asset_json" >/dev/null

      - name: Validate draft asset bytes
        if: steps.release-state.outputs.exists == 'false'
        run: |
          set -euo pipefail
          asset_name="yesid.dev-design-${RELEASE_TAG}.tar"
          release_id="${{ steps.create-draft.outputs.release_id }}"
          draft_json="$RUNNER_TEMP/draft-release.json"
          [[ "$release_id" =~ ^[1-9][0-9]*$ ]]
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" >"$draft_json"
          jq -e --arg id "$release_id" --arg tag "$RELEASE_TAG" --arg asset "$asset_name" '
            .id == ($id | tonumber) and
            .tag_name == $tag and
            .draft == true and
            .immutable == false and
            (.assets | length) == 1 and
            ([.assets[] | select(.name == $asset)] | length) == 1 and
            ([.assets[] | select(.name == $asset)][0].state == "uploaded") and
            ([.assets[] | select(.name == $asset)][0].size > 0) and
            ([.assets[] | select(.name == $asset)][0].digest | test("^sha256:[0-9a-f]{64}$"))
          ' "$draft_json" >/dev/null
          draft_size="$(jq -r --arg asset "$asset_name" \
            '[.assets[] | select(.name == $asset)][0].size' "$draft_json")"
          draft_digest="$(jq -r --arg asset "$asset_name" \
            '[.assets[] | select(.name == $asset)][0].digest' "$draft_json")"
          test "$(jq -r '.size' "$RUNNER_TEMP/built-archive-evidence.json")" = "$draft_size"
          test "$(jq -r '.digest' "$RUNNER_TEMP/built-archive-evidence.json")" = "$draft_digest"

      - name: Publish immutable release
        if: steps.release-state.outputs.exists == 'false'
        run: |
          set -euo pipefail
          release_id="${{ steps.create-draft.outputs.release_id }}"
          [[ "$release_id" =~ ^[1-9][0-9]*$ ]]
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F draft=false \
            >"$RUNNER_TEMP/published-release-response.json"
          jq -e --arg id "$release_id" --arg tag "$RELEASE_TAG" '
            .id == ($id | tonumber) and
            .tag_name == $tag and
            .draft == false
          ' "$RUNNER_TEMP/published-release-response.json" >/dev/null

      - name: Verify published release, attestation, tag, digest, and archive
        run: |
          set -euo pipefail
          asset_name="yesid.dev-design-${RELEASE_TAG}.tar"
          release_json="$RUNNER_TEMP/published-release.json"
          verification_root="$RUNNER_TEMP/release-verification"
          downloaded_asset="$verification_root/$asset_name"
          mkdir -p "$verification_root"

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" >"$release_json"
          jq -e --arg tag "$RELEASE_TAG" --arg asset "$asset_name" '
            .tag_name == $tag and
            .draft == false and
            .immutable == true and
            (.assets | length) == 1 and
            ([.assets[] | select(.name == $asset)] | length) == 1 and
            ([.assets[] | select(.name == $asset)][0].state == "uploaded") and
            ([.assets[] | select(.name == $asset)][0].size > 0) and
            ([.assets[] | select(.name == $asset)][0].digest | test("^sha256:[0-9a-f]{64}$"))
          ' "$release_json" >/dev/null

          gh release download "$RELEASE_TAG" \
            --pattern "$asset_name" \
            --dir "$verification_root"
          bun tools/release-archive.ts verify \
            --tag "$RELEASE_TAG" \
            --archive "$downloaded_asset" \
            >"$RUNNER_TEMP/archive-evidence.json"

          expected_size="$(jq -r --arg asset "$asset_name" \
            '[.assets[] | select(.name == $asset)][0].size' "$release_json")"
          expected_digest="$(jq -r --arg asset "$asset_name" \
            '[.assets[] | select(.name == $asset)][0].digest' "$release_json")"
          actual_size="$(jq -r '.size' "$RUNNER_TEMP/archive-evidence.json")"
          actual_digest="$(jq -r '.digest' "$RUNNER_TEMP/archive-evidence.json")"
          test "$actual_size" = "$expected_size"
          test "$actual_digest" = "$expected_digest"

          remote_tag_object="$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            --jq 'select(.object.type == "tag") | .object.sha')"
          gh api "repos/${GITHUB_REPOSITORY}/git/tags/${remote_tag_object}" \
            >"$RUNNER_TEMP/remote-tag.json"
          remote_peeled_commit="$(jq -er --arg tag "$RELEASE_TAG" \
            'select(.tag == $tag and .object.type == "commit") | .object.sha' \
            "$RUNNER_TEMP/remote-tag.json")"
          test "$(jq -r '.tag.object' "$RUNNER_TEMP/archive-evidence.json")" = "$remote_tag_object"
          test "$(jq -r '.tag.peeledCommit' "$RUNNER_TEMP/archive-evidence.json")" = "$remote_peeled_commit"

          attestation_verified=false
          for attempt in {1..12}; do
            if gh release verify "$RELEASE_TAG" && \
              gh release verify-asset "$RELEASE_TAG" "$downloaded_asset"; then
              attestation_verified=true
              break
            fi
            if [[ "$attempt" -lt 12 ]]; then sleep 5; fi
          done
          test "$attestation_verified" = true
