# CI — inert until this repo lands on GitHub (operator decision pending).
# Shape ported from yesid.dev web.yml @ 2bdb611d: PR-only (Actions budget),
# composite setup action, token drift gate, explicit package suites.
name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: typecheck
        run: bun x turbo run check
      - name: tests
        run: bun x turbo run test
      - name: token drift gate
        run: bun run ci:tokens
      - name: build
        run: bun x turbo run build
