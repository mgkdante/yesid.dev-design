# Public-repository CI. Pull requests run the full package and token gates.
# Shape ported from yesid.dev web.yml @ 2bdb611d: PR-only (Actions budget),
# composite setup action, token drift gate, explicit package suites.
name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: typecheck
        run: bun x turbo run check
      - name: tests
        run: bun x turbo run test
      - name: token drift gate
        run: bun run ci:tokens
      - name: build
        run: bun x turbo run build
