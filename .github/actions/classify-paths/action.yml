name: Deterministic path classifier
description: Classify an exact pull-request file set into caller-owned work jobs.

inputs:
  github-token:
    description: Read token for the pull request files API.
    required: true
  rules-json:
    description: Strict schema-1 exact-path and directory-prefix rules.
    required: true

outputs:
  classification:
    description: Canonical schema-1 classification receipt.

runs:
  using: node24
  main: main.mjs
