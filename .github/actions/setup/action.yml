name: Setup Bun + caches
description: |
  Standard CI setup for this monorepo:
    1. setup-bun pinned via .bun-version
    2. Restore Bun deps cache (~/.bun/install/cache, keyed by bun.lock)
    3. Restore Turbo cache (.turbo/cache, keyed by SHA with prefix
       restore-keys so warm starts work)
    4. Restore Vitest cache (apps/gallery/.vitest/cache — populated because
       apps/gallery/vite.config.ts relocates Vitest's cacheDir there when
       process.env.VITEST is set; apps/cms uses bun test, not Vitest,
       so no cache there)
    5. `bun install --frozen-lockfile`

  Caller must run `actions/checkout@v4` first.

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version-file: .bun-version

    - name: Cache Bun install cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Cache Turbo
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: .turbo/cache
        # SHA-pinned key for exact-match writes; prefix restore so warm starts
        # pick up the most recent cache even when no exact match exists.
        key: turbo-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-

    - name: Cache Vitest
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: apps/gallery/.vitest/cache
        key: vitest-${{ runner.os }}-${{ hashFiles('bun.lock', 'apps/gallery/vite.config.ts') }}
        restore-keys: |
          vitest-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
